services:
  - type: web
    name: transcriptops-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: VALID_API_KEYS
        sync: false
      - key: RAPIDAPI_PROXY_SECRET
        sync: false
      - key: RATE_LIMIT_PER_MINUTE
        value: 20
      - key: APP_VERSION
        value: 1.0.0
      - key: APP_ENV
        value: production
    healthCheckPath: /health
    autoDeploy: true
